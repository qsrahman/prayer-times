<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="header-title">
          <img src="../icons/icon-32.png" alt="" class="header-icon" width="20" height="20" />
          <h1 class="title">Prayer Times</h1>
        </div>
        <p id="date" class="date"></p>
        <p id="location" class="location"></p>
      </header>

      <div class="divider"></div>

      <main id="content" class="prayer-list" aria-label="Prayer times"></main>

      <div class="divider"></div>

      <footer class="footer">
        <span id="countdown" class="countdown"></span>
        <button id="settings-btn" class="settings-btn" title="Settings" aria-label="Open settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M13.5 8a5.5 5.5 0 0 1-.3 1.8l1.3.8-.9 1.6-1.5-.4a5.5 5.5 0 0 1-1.6 1l.1 1.6h-1.8l.1-1.6a5.5 5.5 0 0 1-1.6-1l-1.5.4-.9-1.6 1.3-.8A5.5 5.5 0 0 1 4.5 8a5.5 5.5 0 0 1 .3-1.8L3.5 5.4l.9-1.6 1.5.4a5.5 5.5 0 0 1 1.6-1L7.4 1.6h1.8l-.1 1.6a5.5 5.5 0 0 1 1.6 1l1.5-.4.9 1.6-1.3.8c.2.6.3 1.2.3 1.8z"/>
          </svg>
        </button>
      </footer>
    </div>

    <script src="../lib/prayer-times.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
